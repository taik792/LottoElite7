<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotto Elite Pro</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#031d2e;
    color:white;
    text-align:center;
}

h1 {
    color:#00e5ff;
}

.section {
    margin-top:30px;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap:15px;
    padding:20px;
}

.card {
    background:#082c44;
    border:2px solid #00e5ff;
    border-radius:15px;
    padding:15px;
}

.card.top {
    background:#3a2a00;
    border:2px solid gold;
}

.card.jolly {
    background:red;
    border:none;
}

.numeri {
    font-size:22px;
    color:#00e5ff;
    margin:10px 0;
}

.score {
    color:#ff9aa2;
}
</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO</h1>
<h2>Motore 9</h2>

<div class="section">
<h2>🎯 TOP</h2>
<div id="top" class="grid"></div>
</div>

<div class="section">
<h2>💣 JOLLY</h2>
<div id="jolly" class="grid"></div>
</div>

<div class="section">
<h2>📊 TERNO FORTE</h2>
<div id="ruote" class="grid"></div>
</div>

<script>
async function carica() {
    const res = await fetch("risultati.json");
    const dati = await res.json();

    // ===== TOP =====
    const topDiv = document.getElementById("top");
    topDiv.innerHTML = "";

    Object.entries(dati.top).forEach(([ruota, r]) => {
        topDiv.innerHTML += `
        <div class="card top">
            <h3>${ruota}</h3>
            <div class="numeri">${r.numeri.join(" — ")}</div>
            <div class="score">Score: ${r.score}</div>
        </div>`;
    });

    // ===== JOLLY =====
    const jollyDiv = document.getElementById("jolly");
    jollyDiv.innerHTML = "";

    if (dati.jolly) {
        jollyDiv.innerHTML = `
        <div class="card jolly">
            <h3>${dati.jolly.ruota}</h3>
            <div class="numeri">${dati.jolly.numeri.join(" — ")}</div>
            <div class="score">Score: ${dati.jolly.score}</div>
        </div>`;
    }

    // ===== RUOTE =====
    const ruoteDiv = document.getElementById("ruote");
    ruoteDiv.innerHTML = "";

    Object.entries(dati.ruote).forEach(([ruota, r]) => {
        ruoteDiv.innerHTML += `
        <div class="card">
            <h3>${ruota}</h3>
            <div>Ultima Estrazione</div>
            <div>${r.ultima_estrazione.join(" • ")}</div>

            <div style="margin-top:10px;">Terno Forte</div>
            <div class="numeri">${r.numeri.join(" — ")}</div>

            <div class="score">Score: ${r.score}</div>
        </div>`;
    });
}

carica();
</script>

</body>
</html>
