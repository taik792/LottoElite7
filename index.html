<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lotto Elite Pro</title>

<style>
body { background:#061a2b; color:white; text-align:center; }
.card { border:2px solid #00e5ff; margin:10px; padding:10px; border-radius:10px;}
.top { border:3px solid gold; }
.jolly { background:red; }
.numero { color:#00e5ff; font-size:20px; }
</style>

</head>
<body>

<h1>🔥 LOTTO ELITE PRO</h1>
<h2>Motore 9 PRO</h2>

<div id="top"></div>
<div id="jolly"></div>
<div id="ruote"></div>

<script>

async function carica() {

    const res = await fetch("risultati.json");
    const dati = await res.json();

    let lista = Object.entries(dati.top).map(([ruota, r]) => ({
        ruota,
        numeri: r.numeri,
        score: r.score,
        ultima: r.ultima_estrazione
    }));

    lista.sort((a,b)=>b.score-a.score);

    let top3 = lista.slice(0,3);

    // TOP
    document.getElementById("top").innerHTML =
        top3.map(t=>`
        <div class="card top">
            <h3>${t.ruota}</h3>
            <div class="numero">${t.numeri.join(" — ")}</div>
            <div>${t.score}</div>
        </div>`).join("");

    // JOLLY
    let j = top3[0];
    document.getElementById("jolly").innerHTML = `
        <div class="card jolly">
            <h3>${j.ruota}</h3>
            <div class="numero">${j.numeri.join(" — ")}</div>
        </div>`;

    // RUOTE
    document.getElementById("ruote").innerHTML =
        lista.map(r=>`
        <div class="card">
            <h3>${r.ruota}</h3>
            <div>${r.ultima.join(" • ")}</div>
            <div class="numero">${r.numeri.join(" — ")}</div>
            <div>${r.score}</div>
        </div>`).join("");
}

carica();

</script>

</body>
</html>
