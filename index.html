<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lotto Elite Pro</title>

<style>
body {
    font-family: Arial;
    background: #061b2b;
    color: white;
    text-align: center;
}

.row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
}

.card {
    border: 2px solid #00e5ff;
    border-radius: 10px;
    padding: 10px;
    margin: 10px;
    min-width: 120px;
}

.top-card {
    border-color: gold;
    background: #2a1a00;
}

.jolly {
    background: red;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.numeri {
    color: #00e5ff;
}
</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO</h1>
<h2>Motore 9 PRO</h2>

<h3>🎯 TOP</h3>
<div id="top" class="row"></div>

<h3>💣 JOLLY</h3>
<div id="jolly"></div>

<h3>📊 TERNO FORTE</h3>
<div id="ruote" class="grid"></div>

<script>
fetch("risultati.json?v=" + new Date().getTime())
.then(r => r.json())
.then(data => {

    let risultati = [];

    // 🔹 CONVERTE JSON IN ARRAY UTILIZZABILE
    Object.entries(data).forEach(([ruota, estrazioni]) => {

        estrazioni.forEach(e => {

            // prendi primi 3 numeri
            let numeri = e.slice(0,3);

            // score semplice (somma)
            let score = numeri.reduce((a,b)=>a+b,0);

            risultati.push({
                ruota,
                numeri,
                score,
                ultima: e
            });

        });
    });

    // 🔹 ORDINA PER SCORE
    risultati.sort((a,b)=>b.score-a.score);

    // ===== TOP (3 MIGLIORI)
    let top3 = risultati.slice(0,3);

    document.getElementById("top").innerHTML = top3.map(t => `
        <div class="card top-card">
            <b>${t.ruota}</b>
            <div class="numeri">${t.numeri.join(" — ")}</div>
            <div>Score: ${t.score}</div>
        </div>
    `).join("");

    // ===== JOLLY (IL PRIMO)
    let j = top3[0];

    document.getElementById("jolly").innerHTML = `
        <div class="card jolly">
            <b>${j.ruota}</b>
            <div class="numeri">${j.numeri.join(" — ")}</div>
        </div>
    `;

    // ===== RUOTE (UNA PER RUOTA)
    let viste = new Set();
    let ruoteFinali = [];

    risultati.forEach(r => {
        if (!viste.has(r.ruota)) {
            viste.add(r.ruota);
            ruoteFinali.push(r);
        }
    });

    document.getElementById("ruote").innerHTML = ruoteFinali.map(r => `
        <div class="card">
            <b>${r.ruota}</b>
            <div>Ultima Estrazione</div>
            <div>${r.ultima.join(" • ")}</div>
            <div class="numeri">${r.numeri.join(" — ")}</div>
            <div>Score: ${r.score}</div>
        </div>
    `).join("");

});
</script>

</body>
</html>
