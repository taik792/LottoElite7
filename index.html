<!-- index.html -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOTTO ELITE PRO - MOTORE 7</title>
</head>
<body>

<h1>🔥 LOTTO ELITE PRO</h1>
<h2>MOTORE 7 - TERNO STRATEGICO</h2>

<div id="top"></div>
<div id="jolly"></div>
<div id="terno"></div>

<script>
fetch("risultati.json?v=" + new Date().getTime())
.then(res => res.json())
.then(data => {

    const topDiv = document.getElementById("top");
    const jollyDiv = document.getElementById("jolly");
    const ternoDiv = document.getElementById("terno");

    // TOP
    topDiv.innerHTML = "<h2>🎯 TOP 3</h2>";
    data.top.forEach(item => {
        topDiv.innerHTML += `
            <div>
                <h3>${item.ruota}</h3>
                <p>${item.numeri.join(" — ")}</p>
            </div>
        `;
    });

    // JOLLY
    if (data.jolly.length > 0) {
        const j = data.jolly[0];

        jollyDiv.innerHTML = `
            <h2>💣 JOLLY PREMIUM</h2>
            <div>
                <h3>${j.ruota}</h3>
                <p>${j.numeri.join(" — ")}</p>
            </div>
        `;
    }

    // TERNO FORTE
    ternoDiv.innerHTML = "<h2>📊 TERNO FORTE</h2>";

    data.terno_forte.forEach(item => {
        ternoDiv.innerHTML += `
            <div>
                <h3>${item.ruota}</h3>
                <p>Ultima Estrazione: ${item.ultima_estrazione.join(" • ")}</p>
                <p><strong>${item.numeri.join(" — ")}</strong></p>
                <p>Score: ${item.score}</p>
            </div>
        `;
    });

});
</script>

</body>
</html>
