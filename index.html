<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lotto Elite Pro</title>

<style>
body {
    background: #061e2c;
    color: #fff;
    font-family: Arial;
    text-align: center;
}

h1 {
    color: #00e5ff;
}

.section {
    margin-top: 30px;
}

.row {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

.box {
    border: 2px solid #00e5ff;
    border-radius: 12px;
    padding: 10px;
    width: 150px;
}

.top {
    border-color: gold;
}

.jolly {
    background: red;
}

.numeri {
    font-size: 20px;
    color: #00e5ff;
}

small {
    color: #ff6b6b;
}
</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO</h1>
<h2>Motore 9 PRO</h2>

<div class="section">
    <h3>🎯 TOP</h3>
    <div id="top" class="row"></div>
</div>

<div class="section">
    <h3>💣 JOLLY</h3>
    <div id="jolly" class="row"></div>
</div>

<div class="section">
    <h3>📊 TERNO FORTE</h3>
    <div id="ruote" class="row"></div>
</div>

<script>
async function carica() {
    try {
        const res = await fetch("./risultati.json");
        const dati = await res.json();

        // ===== TOP (tutti su una riga) =====
        const topDiv = document.getElementById("top");
        topDiv.innerHTML = "";

        Object.entries(dati.top).forEach(([ruota, r]) => {
            topDiv.innerHTML += `
                <div class="box top">
                    <div>${ruota}</div>
                    <div class="numeri">${r.numeri.join(" — ")}</div>
                    <small>${r.score}</small>
                </div>
            `;
        });

        // ===== JOLLY (una riga) =====
        const jollyDiv = document.getElementById("jolly");
        jollyDiv.innerHTML = "";

        Object.entries(dati.jolly).forEach(([ruota, r]) => {
            jollyDiv.innerHTML += `
                <div class="box jolly">
                    <div>${ruota}</div>
                    <div class="numeri">${r.numeri.join(" — ")}</div>
                </div>
            `;
        });

        // ===== TERNO FORTE (3 per riga) =====
        const ruoteDiv = document.getElementById("ruote");
        ruoteDiv.innerHTML = "";

        let contatore = 0;
        let row = document.createElement("div");
        row.className = "row";

        Object.entries(dati.ruote).forEach(([ruota, r]) => {

            const box = document.createElement("div");
            box.className = "box";

            box.innerHTML = `
                <div>${ruota}</div>
                <div>${r.ultima_estrazione.join(" • ")}</div>
                <div class="numeri">${r.numeri.join(" — ")}</div>
                <small>${r.score}</small>
            `;

            row.appendChild(box);
            contatore++;

            if (contatore === 3) {
                ruoteDiv.appendChild(row);
                row = document.createElement("div");
                row.className = "row";
                contatore = 0;
            }
        });

        if (contatore > 0) {
            ruoteDiv.appendChild(row);
        }

    } catch (e) {
        console.error("Errore:", e);
    }
}

carica();
</script>

</body>
</html>
