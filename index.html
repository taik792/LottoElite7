<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>LOTTO ELITE PRO</title>

<style>
body {
    background: #061a2b;
    color: white;
    font-family: Arial;
    text-align: center;
}

h1 {
    color: #00e5ff;
}

.card {
    border: 2px solid #00e5ff;
    border-radius: 15px;
    padding: 15px;
    margin: 10px;
}

.top {
    border: 3px solid gold;
    background: #2a1f00;
}

.jolly {
    background: red;
    border: 3px solid darkred;
}

.numero {
    color: #00e5ff;
    font-size: 22px;
}

.score {
    color: pink;
}
</style>

</head>
<body>

<h1>🔥 LOTTO ELITE PRO</h1>
<h2>Motore 9</h2>

<h3>🎯 TOP</h3>
<div id="top"></div>

<h3>💣 JOLLY</h3>
<div id="jolly"></div>

<h3>📊 TERNO FORTE</h3>
<div id="ruote"></div>

<script>

async function carica() {

    const res = await fetch("risultati.json");
    const dati = await res.json();

    let risultati = [];

    // 🔥 CALCOLO TERNI + SCORE
    Object.entries(dati.top).forEach(([ruota, r]) => {

        let estrazione = r.ultima_estrazione;

        let terno = generaTerno(estrazione);
        let score = calcolaScore(terno, estrazione);

        risultati.push({
            ruota,
            numeri: terno,
            score,
            ultima: estrazione
        });

    });

    // 🔝 ORDINA TOP
    risultati.sort((a,b) => b.score - a.score);

    let top3 = risultati.slice(0,3);

    // ===== TOP =====
    const topDiv = document.getElementById("top");
    topDiv.innerHTML = "";

    top3.forEach(t => {
        topDiv.innerHTML += `
        <div class="card top">
            <h3>${t.ruota}</h3>
            <div class="numero">${t.numeri.join(" — ")}</div>
            <div class="score">Score: ${t.score}</div>
        </div>
        `;
    });

    // ===== JOLLY =====
    const j = top3[0];
    document.getElementById("jolly").innerHTML = `
        <div class="card jolly">
            <h3>${j.ruota}</h3>
            <div class="numero">${j.numeri.join(" — ")}</div>
            <div class="score">Score: ${j.score}</div>
        </div>
    `;

    // ===== RUOTE =====
    const ruoteDiv = document.getElementById("ruote");
    ruoteDiv.innerHTML = "";

    risultati.forEach(r => {
        ruoteDiv.innerHTML += `
        <div class="card">
            <h3>${r.ruota}</h3>
            <div>Ultima Estrazione</div>
            <div>${r.ultima.join(" • ")}</div>
            <div>TERNO FORTE</div>
            <div class="numero">${r.numeri.join(" — ")}</div>
            <div class="score">Score: ${r.score}</div>
        </div>
        `;
    });

}


// 🎲 GENERAZIONE TERNO
function generaTerno(estrazione) {

    let numeri = [];

    while(numeri.length < 3) {
        let n = Math.floor(Math.random()*90) + 1;

        if (!estrazione.includes(n) && !numeri.includes(n)) {
            numeri.push(n);
        }
    }

    return numeri;
}


// 🧠 SCORE SERIO (non più quello inutile da 225)
function calcolaScore(terno, estrazione) {

    let score = 0;

    // distanza dai numeri usciti
    terno.forEach(n => {
        if (!estrazione.includes(n)) score += 15;
        else score -= 25;
    });

    // varietà (spread)
    let diff =
        Math.abs(terno[0] - terno[1]) +
        Math.abs(terno[1] - terno[2]);

    score += diff;

    // pari/dispari bilanciati
    let pari = terno.filter(n => n % 2 === 0).length;
    if (pari === 1 || pari === 2) score += 20;

    // random leggero (rompe pareggi)
    score += Math.floor(Math.random()*20);

    return score;
}


carica();

</script>

</body>
</html>
