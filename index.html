<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lotto Elite Pro</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#082c3a;
  color:white;
  text-align:center;
}

h1 {
  color:#00e5ff;
}

.container {
  padding:20px;
}

.section {
  margin-top:30px;
}

.row {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

.card {
  border:2px solid #00e5ff;
  border-radius:15px;
  padding:15px;
  min-width:120px;
}

.gold {
  border-color: gold;
  background:#3a2a00;
}

.red {
  background:red;
}

.numeri {
  font-size:22px;
  color:#00e5ff;
  margin-top:5px;
}

.score {
  color:#ff8a8a;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 LOTTO ELITE PRO</h1>
<h2>Motore 9 PRO</h2>

<!-- TOP -->
<div class="section">
<h3>🎯 TOP</h3>
<div id="top" class="row"></div>
</div>

<!-- JOLLY -->
<div class="section">
<h3>💣 JOLLY</h3>
<div id="jolly" class="row"></div>
</div>

<!-- TERNO -->
<div class="section">
<h3>📊 TERNO FORTE</h3>
<div id="ruote"></div>
</div>

</div>

<script>

async function carica() {
  const res = await fetch("risultati.json");
  const dati = await res.json();

  // ================= TOP =================
  const topDiv = document.getElementById("top");
  topDiv.innerHTML = "";

  dati.top.forEach(t => {
    topDiv.innerHTML += `
      <div class="card gold">
        <div>${t.ruota}</div>
        <div class="numeri">${t.numeri.join(" — ")}</div>
        <div class="score">${t.score}</div>
      </div>
    `;
  });

  // ================= JOLLY =================
  const jollyDiv = document.getElementById("jolly");
  jollyDiv.innerHTML = `
    <div class="card red">
      <div>${dati.jolly.ruota}</div>
      <div class="numeri">${dati.jolly.numeri.join(" — ")}</div>
    </div>
  `;

  // ================= TERNO A RIGHE DA 3 =================
  const ruoteDiv = document.getElementById("ruote");
  ruoteDiv.innerHTML = "";

  let gruppo = "";

  Object.entries(dati.ruote).forEach(([ruota, r], i) => {

    gruppo += `
      <div class="card">
        <div>${ruota}</div>
        <div style="font-size:12px">${r.ultima_estrazione.join(" • ")}</div>
        <div class="numeri">${r.numeri.join(" — ")}</div>
        <div class="score">${r.score}</div>
      </div>
    `;

    // ogni 3 crea una riga
    if ((i + 1) % 3 === 0) {
      ruoteDiv.innerHTML += `<div class="row">${gruppo}</div>`;
      gruppo = "";
    }
  });

  // eventuali resti
  if (gruppo !== "") {
    ruoteDiv.innerHTML += `<div class="row">${gruppo}</div>`;
  }
}

carica();

</script>

</body>
</html>
