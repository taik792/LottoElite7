<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lotto Elite Pro</title>

<style>
body {
    background:#061826;
    color:white;
    font-family:Arial;
    text-align:center;
}

.box {
    border:2px solid cyan;
    margin:10px;
    padding:15px;
    border-radius:12px;
}

.top {
    border-color:gold;
}

.jolly {
    background:red;
}

.numero {
    color:#00eaff;
    font-size:22px;
}
</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO</h1>
<h2>Motore 9 PRO</h2>

<h3>🎯 TOP</h3>
<div id="top"></div>

<h3>💣 JOLLY</h3>
<div id="jolly"></div>

<h3>📊 TERNO FORTE</h3>
<div id="ruote"></div>

<script>
fetch("risultati.json")
.then(res => res.json())
.then(dati => {

    // ===== TOP =====
    const topDiv = document.getElementById("top");
    topDiv.innerHTML = "";

    Object.entries(dati.top).forEach(([ruota, r]) => {
        topDiv.innerHTML += `
        <div class="box top">
            <h3>${ruota}</h3>
            <div class="numero">${r.numeri.join(" — ")}</div>
            <div>Score: ${r.score}</div>
        </div>`;
    });

    // ===== JOLLY =====
    const jollyDiv = document.getElementById("jolly");
    jollyDiv.innerHTML = "";

    Object.entries(dati.jolly).forEach(([ruota, r]) => {
        jollyDiv.innerHTML += `
        <div class="box jolly">
            <h3>${ruota}</h3>
            <div class="numero">${r.numeri.join(" — ")}</div>
        </div>`;
    });

    // ===== RUOTE =====
    const ruoteDiv = document.getElementById("ruote");
    ruoteDiv.innerHTML = "";

    Object.entries(dati.ruote).forEach(([ruota, r]) => {
        ruoteDiv.innerHTML += `
        <div class="box">
            <h3>${ruota}</h3>
            <div>Ultima Estrazione</div>
            <div>${r.ultima_estrazione.join(" • ")}</div>
            <div class="numero">${r.numeri.join(" — ")}</div>
            <div>Score: ${r.score}</div>
        </div>`;
    });

});
</script>

</body>
</html>
